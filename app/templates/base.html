<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}胡嘉鑫 | AI 应用开发者{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 自定义光标 -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- 导航栏 -->
    <nav class="navbar glass">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-star">✦</span> Hujiaxin
            </a>
            <ul class="nav-links">
                <li><a href="/" class="{% if page == 'home' %}active{% endif %}">首页</a></li>
                <li><a href="/about" class="{% if page == 'about' %}active{% endif %}">关于我</a></li>
                <li><a href="/projects" class="{% if page == 'projects' %}active{% endif %}">项目</a></li>
                <li><a href="/blog" class="{% if page == 'blog' %}active{% endif %}">博客</a></li>
                <li><a href="/contact" class="{% if page == 'contact' %}active{% endif %}">联系我</a></li>
                {% if logged_in %}
                <li><a href="/admin" class="nav-admin">管理</a></li>
                {% endif %}
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" aria-label="切换主题">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </button>
                <button class="nav-toggle" aria-label="菜单">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 胡嘉鑫 — 用 ❤️ 和 FastAPI 构建</p>
            <div class="footer-links">
                <a href="https://github.com/hubayi81" target="_blank" rel="noopener">GitHub</a>
                <a href="/contact">联系我</a>
            </div>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
