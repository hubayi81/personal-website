<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <main class="login-page">
        <div class="login-glass-card">
            <div class="login-card-glow"></div>
            <div class="login-card-inner">
                <div class="login-card-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
                </div>
                <h1>管理员登录</h1>

                {% if error %}
                <div class="login-error-msg">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/admin/login" class="login-glass-form">
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="auth-input-group">
                        <input type="text" name="username" id="username" required autocomplete="username" autofocus>
                        <label for="username">用户名</label>
                    </div>
                    <div class="auth-input-group">
                        <input type="password" name="password" id="password" required autocomplete="current-password">
                        <label for="password">密码</label>
                    </div>
                    <button type="submit" class="auth-submit"><span class="auth-submit-text">登 录</span></button>
                </form>

                <a href="/" class="login-back">← 返回首页</a>
            </div>
        </div>
    </main>
    <script src="/static/js/main.js"></script>
</body>
</html>
