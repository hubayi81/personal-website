<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}管理后台{% endblock %} | 胡嘉鑫</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="admin-body">
    <nav class="admin-nav">
        <div class="admin-nav-left">
            <a href="/admin" class="admin-logo">✦ 后台管理</a>
        </div>
        <div class="admin-nav-links">
            <a href="/admin/projects">项目管理</a>
            <a href="/admin/blogs">博客管理</a>
            <a href="/" target="_blank">查看网站</a>
            <a href="/admin/logout" class="logout-btn">登出</a>
        </div>
    </nav>

    <div class="admin-container">
        <aside class="admin-sidebar">
            <ul>
                <li><a href="/admin">📊 仪表盘</a></li>
                <li><a href="/admin/projects">🚀 项目管理</a></li>
                <li><a href="/admin/projects/new">➕ 新建项目</a></li>
                <li><a href="/admin/blogs">📝 博客管理</a></li>
                <li><a href="/admin/blogs/new">✍️ 写博客</a></li>
            </ul>
        </aside>
        <main class="admin-main">
            {% block admin_content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
