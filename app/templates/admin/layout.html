<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}管理后台{% endblock %} | 胡嘉鑫</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="admin-body">
    <!-- 自定义光标 -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <nav class="admin-nav">
        <div class="admin-nav-left">
            <a href="/admin" class="admin-logo">✦ 后台管理</a>
        </div>
        <div class="admin-nav-right">
            <a href="/" target="_blank" class="admin-view-site">查看网站 ↗</a>
            <a href="/admin/logout" class="admin-nav-logout">退出</a>
        </div>
    </nav>

    <div class="admin-container">
        <aside class="admin-sidebar">
            <ul>
                <li><a href="/admin">📊 数据看板</a></li>
                <li><a href="/admin/projects">🚀 项目管理</a></li>
                <li><a href="/admin/projects/new">➕ 新建项目</a></li>
                <li><a href="/admin/blogs">📝 博客管理</a></li>
                <li><a href="/admin/blogs/new">✍️ 写博客</a></li>
                <li><a href="/admin/awards">🏆 奖项管理</a></li>
                <li><a href="/admin/awards/new">➕ 添加奖项</a></li>
            </ul>
        </aside>
        <main class="admin-main">
            {% block admin_content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
